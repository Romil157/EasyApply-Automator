name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"

    - name: Run Ruff check
      run: python -m ruff check .

    - name: Run Mypy
      run: python -m mypy easy_apply_automator --ignore-missing-imports

    - name: Run Tests
      run: python -m pytest tests/ -v --cov=easy_apply_automator --cov-report=term-missing --cov-report=xml

